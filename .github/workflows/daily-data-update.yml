# Actualização diária na nuvem (GitHub Actions): corre mesmo com o portátil desligado.
# Grátis: repositório público = minutos ilimitados; privado = quota mensal (ver conta GitHub).
#
# Horário: cron em UTC. 22h em Lisboa no INVERNO (WET = UTC+0) = 22:00 UTC.
# No VERÃO (WEST = UTC+1), 22h Lisboa = 21:00 UTC → altera para "0 21 * * *" ou usa dois crons.
name: Daily data (prices + freeze + weights)

on:
  schedule:
    # Duas execuções para cobrir hora local de Lisboa todo o ano (WEST/WET).
    # A concorrência evita corridas; se uma execução já estiver ativa, a outra é cancelada.
    - cron: "0 21 * * *"
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-data-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python deps
        run: pip install -r backend/requirements.txt

      - name: Update prices (Yahoo / yfinance)
        working-directory: backend
        run: python scripts/update_prices_close_yfinance.py

      - name: Regenerate smooth freeze outputs (motor V5 obrigatório — sem fallback)
        working-directory: backend
        # IMPORTANTE: DECIDE_FREEZE_FALLBACK_ENGINE_V2 é intencionalmente AUSENTE.
        # Se engine_research_v5.py não estiver disponível, o script termina com erro (rc != 0)
        # e o step seguinte de validação impede qualquer commit de dados incorrectos.
        # O engine_v2 produz CAGR ~18% (errado) vs ~25% do V5 — nunca deve substituir o V5 em produção.
        run: |
          if python -c "from pathlib import Path; exit(0 if Path('engine_research_v5.py').is_file() else 1)" 2>/dev/null; then
            echo "engine_research_v5.py encontrado — a regenerar freeze..."
            python scripts/regenerate_smooth_freeze_outputs.py --transaction-cost-bps 3 --slippage-bps 3 --fx-conversion-bps 0
          else
            echo "SKIP: engine_research_v5.py ausente neste ambiente CI — freeze NÃO actualizado."
            echo "      Só os preços são actualizados. O freeze mantém a última versão válida do motor V5."
            echo "      Para actualizar o freeze, corre localmente com o clone completo (DECIDE_CORE22_CLONE)."
          fi

      - name: Validate freeze CAGR (guard anti-regressão)
        # Rejeita o commit se o CAGR do freeze cair abaixo do mínimo esperado do motor V5.
        # Isto impede que um fallback silencioso ou dados corrompidos cheguem ao Render/produção.
        run: |
          python - <<'PYEOF'
          import json, sys
          from pathlib import Path
          p = Path("freeze/DECIDE_MODEL_V5_V2_3_SMOOTH/model_outputs/v5_kpis.json")
          if not p.is_file():
              print("SKIP: v5_kpis.json ausente — nada a validar.")
              sys.exit(0)
          d = json.loads(p.read_text(encoding="utf-8-sig"))
          cagr = float(d.get("overlayed_cagr") or 0) * 100
          # Limiar conservador: motor V5 dá ~23-25%; engine_v2 dá ~18-20%.
          # Qualquer valor abaixo de 21% indica engine errado ou dados truncados.
          MIN_CAGR = 21.0
          if cagr < MIN_CAGR:
              print(
                  f"ERRO: CAGR do freeze = {cagr:.2f}% < {MIN_CAGR}% — commit BLOQUEADO.",
                  file=sys.stderr,
              )
              print(
                  "      O freeze foi possivelmente gerado com engine_v2 (fallback) ou dados incompletos.",
                  file=sys.stderr,
              )
              print(
                  "      Restaura manualmente o freeze com engine_research_v5 e faz push.",
                  file=sys.stderr,
              )
              sys.exit(1)
          print(f"OK: CAGR do freeze = {cagr:.2f}% >= {MIN_CAGR}% — validação passou.")
          PYEOF

      - name: Sync freeze outputs to frontend landing data
        # Só sincroniza se o freeze foi efectivamente regenerado nesta execução.
        run: |
          if git diff --quiet freeze/DECIDE_MODEL_V5_V2_3_SMOOTH/model_outputs/; then
            echo "SKIP: freeze não alterado nesta execução — sem sincronização para frontend/data."
          else
            echo "Freeze alterado — a sincronizar para frontend/data/landing/freeze-cap15..."
            mkdir -p frontend/data/landing/freeze-cap15
            cp -f freeze/DECIDE_MODEL_V5_V2_3_SMOOTH/model_outputs/*.csv frontend/data/landing/freeze-cap15/
            cp -f freeze/DECIDE_MODEL_V5_V2_3_SMOOTH/model_outputs/*.json frontend/data/landing/freeze-cap15/
            # O endpoint /api/client/recommendations-history lê backend/data/weights_by_rebalance.csv.
            cp -f freeze/DECIDE_MODEL_V5_V2_3_SMOOTH/model_outputs/weights_by_rebalance.csv backend/data/weights_by_rebalance.csv
          fi

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/data freeze/DECIDE_MODEL_V5_V2_3_SMOOTH/model_outputs frontend/data/landing/freeze-cap15
          if git diff --cached --quiet; then
            echo "Nada a gravar (CSV já actualizados)."
            exit 0
          fi
          git commit -m "chore(data): preços diários $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
